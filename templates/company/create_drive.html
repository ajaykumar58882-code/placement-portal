{% extends 'base.html' %}
{% block title %}Create Drive{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h3 class="mb-4 text-primary font-weight-bold">Create New Placement Drive</h3>
        <div class="card p-4 shadow-sm">
            <form method="POST" action="">
                <div class="mb-3">
                    <label for="job_title" class="form-label text-secondary fw-semibold">Job Title</label>
                    <input type="text" class="form-control" id="job_title" name="job_title" required>
                </div>
                <div class="mb-3">
                    <label for="job_description" class="form-label text-secondary fw-semibold">Job Description</label>
                    <textarea class="form-control" id="job_description" name="job_description" rows="4" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="eligibility_criteria" class="form-label text-secondary fw-semibold">Eligibility Criteria</label>
                    <textarea class="form-control" id="eligibility_criteria" name="eligibility_criteria" rows="3" required></textarea>
                </div>
                <div class="mb-4">
                    <label for="application_deadline" class="form-label text-secondary fw-semibold">Application Deadline</label>
                    <input type="datetime-local" class="form-control" id="application_deadline" name="application_deadline" required>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('company.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Drive</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

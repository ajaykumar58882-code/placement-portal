{% extends 'base.html' %}
{% block title %}Login | Prestige Placements{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm mt-5">
            <h3 class="text-center mb-4 font-weight-bold text-primary">Welcome Back</h3>
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="username" class="form-label text-secondary fw-semibold">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-secondary fw-semibold">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Login</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <span class="text-secondary">New here?</span>
                <a href="{{ url_for('auth.register_student') }}" class="text-decoration-none fw-semibold">Register as Student</a> or
                <a href="{{ url_for('auth.register_company') }}" class="text-decoration-none fw-semibold">Company</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

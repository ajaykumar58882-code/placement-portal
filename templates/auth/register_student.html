{% extends 'base.html' %}
{% block title %}Student Register | Prestige Placements{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-sm mt-4">
            <h3 class="text-center mb-4 text-primary font-weight-bold">Student Registration</h3>
            <form method="POST" action="">
                <div class="mb-3">
                    <label for="username" class="form-label text-secondary fw-semibold">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="full_name" class="form-label text-secondary fw-semibold">Full Name</label>
                    <input type="text" class="form-control" id="full_name" name="full_name" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-secondary fw-semibold">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Register</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <span class="text-secondary">Already have an account?</span>
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-semibold">Login instead</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

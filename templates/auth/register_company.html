{% extends 'base.html' %}
{% block title %}Company Register | Prestige Placements{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4 shadow-sm mt-4">
            <h3 class="text-center mb-4 text-primary font-weight-bold">Company Registration</h3>
            <div class="alert alert-info">Note: Company accounts require Admin approval before accessing the dashboard.</div>
            <form method="POST" action="">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="username" class="form-label text-secondary fw-semibold">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label text-secondary fw-semibold">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="company_name" class="form-label text-secondary fw-semibold">Company Name</label>
                    <input type="text" class="form-control" id="company_name" name="company_name" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="hr_name" class="form-label text-secondary fw-semibold">HR Contact Name</label>
                        <input type="text" class="form-control" id="hr_name" name="hr_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="hr_phone" class="form-label text-secondary fw-semibold">HR Contact Phone</label>
                        <input type="text" class="form-control" id="hr_phone" name="hr_phone" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="website" class="form-label text-secondary fw-semibold">Website (Optional)</label>
                    <input type="url" class="form-control" id="website" name="website">
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Submit Application</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <span class="text-secondary">Already have an account?</span>
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-semibold">Login instead</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
